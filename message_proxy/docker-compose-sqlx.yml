services:
  postgres:
    image: postgres:15
    container_name: demo_postgres
    environment:
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "password"
      POSTGRES_DB: "postgres"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username=${POSTGRES_USER} --dbname=message_proxy"]
      interval: 5s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # - ./src/repository/schema.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
  
  migrate:
    # container_name: migrate
    build:
      context: .
      dockerfile: Dockerfile.sqlx-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://admin:password@postgres:5432/postgres?sslmode=disable

volumes:
  postgres-data:
